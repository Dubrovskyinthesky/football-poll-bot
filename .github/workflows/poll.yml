name: Football Poll

   on:
     schedule:
       # Вторник 12:00 по Самаре (UTC+4) = 08:00 UTC
       - cron: '0 8 * * 2'
       # Пятница 12:00 по Самаре (UTC+4) = 08:00 UTC
       - cron: '0 8 * * 5'
     workflow_dispatch:  # кнопка ручного запуска для теста

   jobs:
     send-poll:
       runs-on: ubuntu-latest
       steps:
         - uses: actions/checkout@v4
         - uses: actions/setup-python@v5
           with:
             python-version: '3.11'
         - run: pip install requests
         - run: python send_poll.py
           env:
             BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
             CHAT_ID: ${{ secrets.CHAT_ID }}
