name: Ask Organizer

on:
  schedule:
    - cron: "30 13 * * 1"
    - cron: "30 13 * * 4"
  workflow_dispatch:

jobs:
  ask:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install requests
      - run: python ask_organizer.py
        env:
          BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
          MY_USER_ID: ${{ secrets.MY_USER_ID }}
